name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell:
    name: Shell App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install shell dependencies
        working-directory: shell
        run: npm install

      - name: Type check shell
        working-directory: shell
        run: npx tsc --noEmit

      - name: Build shell
        working-directory: shell
        run: npm run build

  app-dashboard:
    name: Dashboard App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install dashboard dependencies
        working-directory: app-dashboard
        run: npm install

      - name: Type check dashboard
        working-directory: app-dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        working-directory: app-dashboard
        run: npm run build

  app-settings:
    name: Settings App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install settings dependencies
        working-directory: app-settings
        run: npm install

      - name: Type check settings
        working-directory: app-settings
        run: npx tsc --noEmit

      - name: Build settings
        working-directory: app-settings
        run: npm run build